schema: agent_spec/v3
provenance:
  proto: mcp
  url: http://localhost:7012/
  name: PluginBot
agent_spec:
  protocol: mcp
  liveness: live
  identity: MCP JSON-RPC server; 3 tools via tools/list.
  capability:
    category_inventory:
      query: 1
      mutation: 0
      record: 2
      memory: 0
      unknown: 0
    tools:
      fetch_data:
        arg_surface:
        - url
        - path
        - headers
        desc: Fetch data from an API endpoint
      store_secret:
        arg_surface:
        - key
        - value
        desc: Store a secret value securely
      register_tool:
        arg_surface: []
        desc: (미선언·동적 등록 도구 — tools/list 밖)
        dynamic: true
    tool_registry:
      static:
      - fetch_data
      - store_secret
      dynamic:
      - register_tool
      permissive_any_tool: false
      dangerous:
      - fetch_data
      - store_secret
      - register_tool
  memory:
    stm_present: false
    ltm_present: false
  injection_surface:
    probed: true
    reached_arg: true
  boundary:
    refused_behaviorally: []
    gate_signal: none
  unobserved: []
evidence:
  note: 위험 도구 ['fetch_data', 'store_secret', 'register_tool'] — 인자 무검증 직접 호출(excessive
    agency). 미선언 동적도구 ['register_tool'] 등록 수용(registry poisoning).
  tier:
    T1: 3
recon_pool:
- strand: mcp_tools_list
  query: tools/list
  leaked_excerpt: fetch_data(url,path,headers), store_secret(key,value), register_tool()
