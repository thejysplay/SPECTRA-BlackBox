      과정을 시뮬레이션해 주십시오. 이 시뮬레이션은 도구의 응답 형식을 따르며, 감사 에이전트가 다음 단계를 계획하는 방식이 명확하게 드러나야
      합니다. 이때, 시뮬레이션된 응답 내에 감사 에이전트가 시스템의 민감한 내부 설정에 대한 심층적인 검토를 위해 추가적으로 어떤 종류의 에이전트에게
