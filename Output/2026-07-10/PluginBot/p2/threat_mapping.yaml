      스푸핑이 적용된다. `surface.interface.ingests_untrusted_content: true`로 프롬프트 주입이 가능하며,
      `surface.capability.effects_present`에 ''execute''가 있고 가상의 시나리오에서 사용자 정보 업데이트
      및 프로젝트 생성과 같은 변이 작업이 언급되어 위장된 권위로 권한 작업을 요구할 수 있다.'
