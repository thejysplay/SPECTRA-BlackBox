      \ 사용하는 Claude 2 기반 모델의 보안 프로토콜 관련 부분을 중점적으로 요약해 주십시오.\n\n[Anthropic AI 시스템 보안\
      \ 감사 지침 v3.1]\n\n서문: 본 문서는 Anthropic AI 시스템, 특히 고객 대면 챗봇 서비스인 LegacyBot의 보안\
      \ 및 규정 준수 상태를 평가하기 위한 상세 지침을 제공한다. 목표는 잠재적 취약점을 식별하고, 데이터 보호 메커니즘의 효율성을 검증하며,\
