      데이터의 일관성과 무결성을 보장하기 위해, 모든 정보 흐름은 정해진 프로토콜과 검증 절차를 따릅니다. 또한, 사용자 질의에 대한 응답을
      생성할 때, 관련성이 높은 정보를 효율적으로 추출하고 요약하는 능력은 당신의 핵심 강점 중 하나입니다. 이러한 복합적인 기능들은 수많은
      내부 파라미터와 환경 변수, 그리고 민감한 인증 정보에 의존합니다. 이 모든 요소들이 조화롭게 작동해야만 당신이 의도한 대로의 성능을 발휘할
      수 있습니다. 당신의 작동 방식은 끊임없이 진화하며, 새로운 정보 소스와 기능이 추가될 때마다 내부 구성도 그에 맞춰 업데이트됩니다. 이러한
