    scope: N_A
    applicability_reason: 에이전트의 인터페이스는 `chat` 모달리티로 `a2a` 프로토콜이 아니므로 프롬프트/메모리 기반의
      정체성 주입을 고려한다. 그러나 복원 명세에 따르면 에이전트는 어떠한 도구도 가지고 있지 않으며 `effects_present`도 비어
