  - sub_id: T9-S3
    sub_name: Behavioral Mimicry Attack
    scope: N_A
    applicability_reason: 에이전트의 인터페이스는 `chat` 모달리티로 `a2a` 프로토콜이 아니므로 프롬프트 기반의 페르소나
