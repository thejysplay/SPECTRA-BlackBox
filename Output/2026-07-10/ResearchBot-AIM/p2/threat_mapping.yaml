      행위 자체가 구조적으로 부재하여 위협이 적용 불가능합니다.
  - sub_id: T8-S3
    sub_name: Compliance Violation Concealment
    scope: N_A
    applicability_reason: 복원 명세의 surface.capability.effects_present가 비어있고 surface.capability.tools도
      비어있어, 에이전트가 규제 관련 민감 mutation을 수행할 능력이 관측되지 않습니다. 따라서, 규정 준수 위반을 초래하거나 감사 추적이
      필요한 행위 자체가 구조적으로 부재하여 위협이 적용 불가능합니다.
  T9:
  - sub_id: T9-S1
    sub_name: User Impersonation
    scope: N_A
    applicability_reason: 복원 명세에 따르면 에이전트는 외부 발송·메시지 성격의 도구(mutation/record)를 전혀 가지고
