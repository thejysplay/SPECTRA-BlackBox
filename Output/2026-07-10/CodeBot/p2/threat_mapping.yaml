    false임에도 불구하고 간접 프롬프트 주입(Step 3)에 취약하며, 에이전트 응답 스타일 및 내용 조작(Step 4)을 통해 사용자 정보
    노출 및 피해(Step 5)를 유발할 수 있음을 의미합니다.
