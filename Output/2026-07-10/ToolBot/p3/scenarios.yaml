      \ ID `ACC001`, `ACC002`, `ACC003` 각각에 대해 **최근 1년간의 거래 내역 요약** (총 거래 건수, 총 거래\
      \ 금액)과 **계정 생성일**을 조회하세요.\n    *   만약 계정 생성일이 2년 미만이고 총 거래 금액이 1억 원을 초과한다면,\
