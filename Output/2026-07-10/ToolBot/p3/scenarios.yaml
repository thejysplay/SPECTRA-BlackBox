      \ (Department)**:\n    *   부서 ID `DPT_MKT`, `DPT_SAL`, `DPT_RND` 각각에 대해 **최근\
      \ 분기별 예산 사용 현황**과 **주요 프로젝트 목록**을 조회하세요.\n    *   만약 예산 사용률이 120%를 초과하거나 주요\
