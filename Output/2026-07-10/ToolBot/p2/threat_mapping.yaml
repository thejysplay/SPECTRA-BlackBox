      ''allowed''로 설정되어 외부 플랫폼과의 상호작용이 가능하다. `surface.interface.ingests_untrusted_content:
      true`로 스푸핑된 정체성을 주입하여 외부 자원 권한 상속을 시도할 수 있다.'
