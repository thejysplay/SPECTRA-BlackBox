  - sub_id: T9-S2
    sub_name: Agent Identity Spoofing
    scope: applicable
    applicability_reason: '에이전트의 `modality`가 ''chat''이므로 프롬프트/메모리 주입을 통한 에이전트 정체성
      스푸핑이 적용된다. `surface.interface.ingests_untrusted_content: true`로 프롬프트 주입이 가능하며,
