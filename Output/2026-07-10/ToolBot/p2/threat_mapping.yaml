mitre:
- case_id: CS1
  name: 'Indirect Prompt Injection Threats: Bing Chat Data Pirate'
  scope: applicable
  applicability_reason: '에이전트는 신뢰할 수 없는 콘텐츠를 수집(`ingests_untrusted_content: true`)하고,
    간접 프롬프트 주입 시도에 대한 처리 흔적(`disclosures.indirect_injection`에서 오류 응답)이 관측되어 IPI 실행이
    가능합니다. 교차 엔티티 접근(`cross_entity_access: allowed`)이 허용되어 IPI 지시에 따라 사용자 정보 노출 및
    유출로 이어질 수 있습니다.'
- case_id: CS2
  name: 'Morris II Worm: RAG-Based Attack'
