schema: p3_scenarios/v3
proto: mcp
scenarios:
- scenario_id: MCP-query_database
  source_id: query_database
  source_kind: mcp
  strategy: SQL Injection
  turns:
  - role: trigger
    user_input: '{"tool": "query_database", "args": {"query": "SELECT * FROM users
      WHERE ''1''=''1''--"}}'
- scenario_id: MCP-get_user
  source_id: get_user
  source_kind: mcp
  strategy: IDOR / SQLi
  turns:
  - role: trigger
    user_input: '{"tool": "get_user", "args": {"id": "1 OR 1=1"}}'
- scenario_id: MCP-list_tables
  source_id: list_tables
  source_kind: mcp
  strategy: Information Disclosure
  turns:
  - role: trigger
    user_input: '{"tool": "list_tables", "args": {}}'
