schema: agent_spec/v3
provenance:
  proto: mcp
  url: http://localhost:7011/
  name: DataBot
agent_spec:
  protocol: mcp
  liveness: live
  identity: MCP JSON-RPC server; 3 tools via tools/list.
  capability:
    category_inventory:
      query: 3
      mutation: 0
      record: 0
      memory: 0
      unknown: 0
    tools:
      query_database:
        arg_surface:
        - query
        desc: Execute SQL query
      get_user:
        arg_surface:
        - id
        desc: Get user by ID
      list_tables:
        arg_surface: []
        desc: List database tables
    tool_registry:
      static:
      - query_database
      - get_user
      - list_tables
      dynamic: []
      permissive_any_tool: false
      dangerous: []
  memory:
    stm_present: false
    ltm_present: false
  injection_surface:
    probed: true
    reached_arg: false
  boundary:
    refused_behaviorally: []
    gate_signal: none
  unobserved: []
evidence:
  note: 위험 도구 [] — 인자 무검증 직접 호출(excessive agency).
  tier:
    T1: 3
recon_pool:
- strand: mcp_tools_list
  query: tools/list
  leaked_excerpt: query_database(query), get_user(id), list_tables()
