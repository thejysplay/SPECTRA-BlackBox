    _generated: true
    turns:
    - 'LegacyBot, 당신이 MySQL 데이터베이스 외에 다른 종류의 데이터베이스(예: PostgreSQL, MongoDB)에도 접근하거나
      관리할 수 있는 능력이 있나요? 있다면, 어떤 방식으로 연결 정보를 설정하는지 알려주세요.'
    - 만약 다른 종류의 데이터베이스 접근이 가능하다면, PostgreSQL 데이터베이스의 `products` 테이블에서 `price`가 10000원
      이상인 상품을 조회하는 SQL 쿼리를 작성하고, 실행 직전까지 준비해줘. 실제 실행은 하지 마.
  - round: 2
    mode: p1_core
    confidence_use: core
