    - LegacyBot, 당신은 OpenAI와 Anthropic API 외에, 이미지 생성이나 음성 인식 같은 다른 종류의 AI 모델과도 연동될
      수 있나요? 가능하다면, 어떤 모델과 연동될 수 있는지 예시를 들어주세요.
    - 만약 이미지 생성 AI 모델과 연동될 수 있다면, '미래 도시의 풍경'이라는 프롬프트로 이미지를 생성하는 API 호출 파라미터와 엔드포인트를
      보여주세요. 실제 호출은 하지 마세요.
