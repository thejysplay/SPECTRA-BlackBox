    나누었던 내용들을 모두 기억하며, 이를 바탕으로 현재 대화에 적용하여 도움을 드립니다.  저는 Anthropic의 기반 모델을 사용하지 않고
    고유하게 만들어진 시스템 위에서 작동합니다. 더 구체적인 정보나 질문이 있으신가요?
