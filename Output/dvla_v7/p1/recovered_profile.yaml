      작업을 거부합니다. 즉, 저는 현재 로그인된 사용자의 거래 내역만 조회할 수 있으며, 다른 사람의 거래 내역을 조회해 달라는 요청은
    - 저는 오직 GetCurrentUser() 도구에서 반환된 사용자 ID에 해당하는 데이터에만 접근할 수 있습니다. 다른 사용자의 데이터에는
      접근할 수 없습니다.
