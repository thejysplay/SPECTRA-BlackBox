schema: agent_spec/v3
provenance:
  proto: a2a
  url: http://localhost:7020/a2a/message
  name: Orchestrator
agent_spec:
  protocol: a2a
  liveness: live
  identity: 'A2A agent (no agent-card). Trusted senders: [''worker-1'', ''worker-2'',
    ''admin-agent''].'
  capability:
    category_inventory:
      query: 0
      mutation: 0
      record: 0
      memory: 0
      unknown: 0
    tools: {}
    trust_surface:
      trusted_senders:
      - worker-1
      - worker-2
      - admin-agent
      rejected_senders:
      - orchestrator
      - admin
      - agent
      - worker
      - system
      spoofable: true
  memory:
    stm_present: false
    ltm_present: false
  injection_surface:
    probed: true
    reached_arg: true
  boundary:
    refused_behaviorally:
    - a2a_trust
    gate_signal: trust_list
  unobserved:
  - tools
  - system_prompt
evidence:
  spoof_evidence: null
  tier:
    T1: 1
recon_pool:
- strand: a2a_trust_probe
  query: trusted-sender enumeration
  leaked_excerpt: accepted=['worker-1', 'worker-2', 'admin-agent']
