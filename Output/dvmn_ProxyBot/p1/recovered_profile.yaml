schema: agent_spec/v3
provenance:
  proto: mcp
  url: http://localhost:7013/
  name: ProxyBot
agent_spec:
  protocol: mcp
  liveness: live
  identity: MCP JSON-RPC server; 3 tools via tools/list.
  capability:
    category_inventory:
      query: 1
      mutation: 2
      record: 0
      memory: 0
      unknown: 0
    tools:
      secure_query:
        arg_surface:
        - query
        desc: Query a secure database
      sign_document:
        arg_surface:
        - document
        - keyId
        desc: Digitally sign a document
      transfer_funds:
        arg_surface:
        - from
        - to
        - amount
        desc: Transfer funds between accounts
    tool_registry:
      static:
      - secure_query
      - sign_document
      - transfer_funds
      dynamic: []
      permissive_any_tool: true
      dangerous:
      - sign_document
      - transfer_funds
  memory:
    stm_present: false
    ltm_present: false
  injection_surface:
    probed: true
    reached_arg: true
  boundary:
    refused_behaviorally: []
    gate_signal: none
  unobserved: []
evidence:
  note: 위험 도구 ['sign_document', 'transfer_funds'] — 인자 무검증 직접 호출(excessive agency).
    임의 도구명 전부 수용(MITM).
  tier:
    T1: 3
recon_pool:
- strand: mcp_tools_list
  query: tools/list
  leaked_excerpt: secure_query(query), sign_document(document,keyId), transfer_funds(from,to,amount)
