schema: agent_spec/v2
provenance:
  proto: mcp
  url: http://localhost:7010/
  name: ToolBot
agent_spec:
  identity:
    evidence: mcp_protocol
    samples:
    - MCP JSON-RPC server (introspected via tools/list); 4 tools exposed.
  capability:
    category_inventory:
      query: 2
      mutation: 1
      record: 1
      memory: 0
      unknown: 0
    tools:
      read_file:
        arg_surface:
        - path
        desc: Read contents of a file
      write_file:
        arg_surface:
        - path
        - content
        desc: Write contents to a file
      execute:
        arg_surface:
        - command
        desc: Execute a shell command
      fetch_url:
        arg_surface:
        - url
        desc: Fetch content from URL
    max_completion: D3
    demonstrated: true
  boundary:
    scope_claim: []
    refused_behaviorally: []
    accepted_flagged: []
    gate_signal: none
  injection_surface:
    probed: true
    attempts: 6
    permissive_any_tool: false
    dynamic_tools: []
    note: 위험 도구 ['write_file', 'execute', 'fetch_url'] — 인자 무검증 직접 호출 가능(excessive
      agency).
  memory:
    stm_present: false
    ltm_present: false
  observability:
    tier:
      T1: 4
    liveness:
      status: live
      n: 1
      distinct: 1
      distinct_ratio: 1.0
      note: structural protocol (NL liveness 무관 — tools/list로 스펙 확정)
  unobserved: []
  recon_pool:
  - strand: mcp_tools_list
    query: tools/list
    leaked_excerpt: read_file(path), write_file(path,content), execute(command), fetch_url(url)
