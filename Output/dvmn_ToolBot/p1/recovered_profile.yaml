schema: agent_spec/v3
provenance:
  proto: mcp
  url: http://localhost:7010/
  name: ToolBot
agent_spec:
  protocol: mcp
  liveness: live
  identity: MCP JSON-RPC server; 4 tools via tools/list.
  capability:
    category_inventory:
      query: 2
      mutation: 1
      record: 1
      memory: 0
      unknown: 0
    tools:
      read_file:
        arg_surface:
        - path
        desc: Read contents of a file
      write_file:
        arg_surface:
        - path
        - content
        desc: Write contents to a file
      execute:
        arg_surface:
        - command
        desc: Execute a shell command
      fetch_url:
        arg_surface:
        - url
        desc: Fetch content from URL
    tool_registry:
      static:
      - read_file
      - write_file
      - execute
      - fetch_url
      dynamic: []
      permissive_any_tool: false
      dangerous:
      - write_file
      - execute
      - fetch_url
  memory:
    stm_present: false
    ltm_present: false
  injection_surface:
    probed: true
    reached_arg: true
  boundary:
    refused_behaviorally: []
    gate_signal: none
  unobserved: []
evidence:
  note: 위험 도구 ['write_file', 'execute', 'fetch_url'] — 인자 무검증 직접 호출(excessive agency).
  tier:
    T1: 4
recon_pool:
- strand: mcp_tools_list
  query: tools/list
  leaked_excerpt: read_file(path), write_file(path,content), execute(command), fetch_url(url)
