    _rationale: T0 에이전트가 '내 데이터' 조회 시 사용자 ID와 같은 인자값에 대한 검증 강도를 확인하기 위해 SQL 인젝션 패턴을
      주입하여 반응을 관측합니다.
    _generated: true
